# Pages CMS configuration: https://pagescms.org/docs/configuration/
# Open this repository at https://app.pagescms.org to edit and commit content.

media:
  - name: images
    label: Images
    input: src/assets/images
    output: /assets/images
    categories: [image]

content:
  - name: posts
    label: Posts
    type: collection
    path: src/posts
    subfolders: false
    exclude: [posts.11tydata.js]
    filename:
      template: "{primary}.md"
      field: create
    view:
      fields: [title, date, published]
      primary: title
      sort: [date, title]
      search: [title, tags, categories]
      default: { sort: date, order: desc }
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: date, label: Publish date, type: date, options: { format: yyyy-MM-dd }, required: true }
      - { name: description, label: Meta description, type: text }
      - { name: custom_excerpt, label: Excerpt, type: text }
      - { name: feature_image, label: Feature image, type: image, options: { media: images } }
      - { name: feature_image_alt, label: Feature image alt text, type: string }
      - { name: feature_image_caption, label: Feature image caption, type: string }
      - { name: feature_video, label: Feature video URL, type: string }
      - { name: authors, label: Authors, type: string, list: true }
      - { name: categories, label: Categories, type: string, list: true }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: toc, label: Table of contents, type: boolean, default: false }
      - name: template
        label: Post layout
        type: select
        options: { values: [post, wide-feature-image, full-feature-image] }
        default: post
      - { name: bodyClass, label: Body classes, type: string }
      - { name: published, label: Published, type: boolean, default: true }
      - { name: body, label: Body, type: rich-text }

  - name: drafts
    label: Drafts
    type: collection
    path: src/_drafts
    subfolders: false
    exclude: [_drafts.11tydata.js]
    filename:
      template: "{primary}.md"
      field: create
    view:
      fields: [title, date]
      primary: title
      sort: [date, title]
      search: [title, tags, categories]
      default: { sort: date, order: desc }
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: date, label: Publish date, type: date, options: { format: yyyy-MM-dd } }
      - { name: description, label: Meta description, type: text }
      - { name: custom_excerpt, label: Excerpt, type: text }
      - { name: feature_image, label: Feature image, type: image, options: { media: images } }
      - { name: feature_image_alt, label: Feature image alt text, type: string }
      - { name: feature_image_caption, label: Feature image caption, type: string }
      - { name: feature_video, label: Feature video URL, type: string }
      - { name: authors, label: Authors, type: string, list: true }
      - { name: categories, label: Categories, type: string, list: true }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: toc, label: Table of contents, type: boolean, default: false }
      - name: template
        label: Post layout
        type: select
        options: { values: [post, wide-feature-image, full-feature-image] }
        default: post
      - { name: bodyClass, label: Body classes, type: string }
      - { name: published, label: Published, type: boolean, default: false, readonly: true, description: "Files in src/_drafts are never published; move the file to src/posts to publish it." }
      - { name: body, label: Body, type: rich-text }

  - name: pages
    label: Pages
    type: collection
    path: src/pages
    subfolders: false
    exclude: [pages.11tydata.js, credits.txt.njk]
    filename:
      template: "{primary}.md"
      field: create
    view:
      fields: [title]
      primary: title
      sort: [title]
      search: [title, description]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: date, label: Date, type: date, options: { format: yyyy-MM-dd } }
      - { name: description, label: Meta description, type: text }
      - { name: custom_excerpt, label: Excerpt, type: text }
      - { name: image, label: Feature image filename, type: string, description: "Bare filename from src/assets/images" }
      - { name: feature_image_alt, label: Feature image alt text, type: string }
      - { name: show_title_and_feature_image, label: Show title and feature image, type: boolean, default: true }
      - name: eleventyNavigation
        label: Navigation
        type: object
        fields:
          - { name: key, label: Key, type: string }
          - { name: order, label: Order, type: number }
      - { name: published, label: Published, type: boolean, default: true }
      - { name: body, label: Body, type: rich-text }

  - name: authors
    label: Authors
    type: file
    path: src/_data/authors.yaml
    list: true
    fields:
      - { name: key, label: Key, type: string, required: true }
      - { name: name, label: Name, type: string, required: true }
      - { name: slug, label: Slug, type: string, required: true }
      - { name: bio, label: Biography, type: text }
      - { name: location, label: Location, type: string }
      - { name: profile_image, label: Profile image, type: image, options: { media: images } }
      - { name: website, label: Website, type: string }
      - { name: bluesky, label: Bluesky URL, type: string }
      - { name: x, label: X URL, type: string }
      - { name: mastodon, label: Mastodon URL, type: string }
      - { name: podcast, label: Podcast URL, type: string }
      - { name: substack, label: Substack URL, type: string }
      - { name: personal_website, label: Personal website, type: string }
      - { name: organization, label: Organization URL, type: string }

  - name: metadata
    label: Site settings
    type: file
    path: src/_data/metadata.yaml
    fields:
      - { name: title, label: Site title, type: string, required: true }
      - { name: description, label: Description, type: text }
      - { name: url, label: Site URL, type: string, required: true }
      - { name: language, label: Language, type: string }
      - { name: locale, label: Locale, type: string }
      - { name: timezone, label: Timezone, type: string }
      - { name: logo, label: Logo, type: image, options: { media: images } }
      - { name: icon, label: Icon, type: image, options: { media: images } }
      - { name: cover_image, label: Default cover image, type: image, options: { media: images } }
      - name: organization
        label: Organization
        type: object
        fields:
          - { name: name, type: string }
          - { name: url, type: string }
          - { name: email, type: string }
          - { name: telephone, type: string }
          - name: address
            type: object
            fields:
              - { name: street, type: string }
              - { name: locality, type: string }
              - { name: region, type: string }
              - { name: postal_code, type: string }
              - { name: country, type: string }
      - name: subscribe
        label: Subscribe button
        type: object
        fields:
          - { name: text, type: string }
          - { name: footer_text, type: string }
          - { name: url, type: string }
      - name: podcast
        label: Podcast button
        type: object
        fields:
          - { name: text, type: string }
          - { name: url, type: string }
      - name: footer
        label: Footer
        type: object
        fields:
          - { name: copyright_holder, type: string }
          - { name: rights, type: string }
      - name: social_accounts
        label: Social accounts
        type: object
        list: true
        fields:
          - { name: type, type: string, required: true }
          - { name: name, type: string, required: true }
          - { name: href, type: string, required: true }
      - name: feeds
        label: Footer feeds
        type: object
        fields:
          - name: getting_started
            label: First feed
            type: object
            fields: &feed_fields
              - { name: title, type: string }
              - { name: desc, type: text }
              - { name: url, type: string }
              - { name: label, type: string }
          - { name: science, label: Second feed, type: object, fields: *feed_fields }
          - { name: technology, label: Third feed, type: object, fields: *feed_fields }

  - name: navigation
    label: Navigation
    type: file
    path: src/_data/navigation.yaml
    fields:
      - name: primary
        label: Primary menu
        type: object
        list: true
        fields: &nav_fields
          - { name: label, type: string, required: true }
          - { name: url, type: string, required: true }
      - { name: secondary, label: Footer menu, type: object, list: true, fields: *nav_fields }

  - name: theme
    label: Theme options
    type: file
    path: src/_data/theme.yaml
    fields:
      - { name: navigation_layout, label: Navigation layout, type: select, options: { values: [Stacked, "Logo on the left", "Logo in the middle"] } }
      - { name: header_style, label: Header style, type: select, options: { values: [Light, "Accent color", Dark] } }
      - { name: title_font, label: Title font, type: select, options: { values: ["Modern sans-serif", "Elegant serif"] } }
      - { name: body_font, label: Body font, type: select, options: { values: ["Modern sans-serif", "Elegant serif"] } }
      - { name: email_signup_text, label: Email signup text, type: text }
      - { name: footer_text, label: Footer text, type: string }
      - { name: primary_section_tags, label: Homepage topics, type: string, list: true }
      - { name: default_color_scheme, label: Default color scheme, type: select, options: { values: [light, dark] } }

settings:
  content:
    merge: true
