# The site's author objects (Ghost's author model), exposed as the global data
# variable `siteAuthors`. `key` is what a post's front matter references
# (`authors: adam-brett`), and `slug` builds the /author/<slug>/ archive.
#
# The variable is deliberately NOT called `authors`: that is the front-matter
# key, and Eleventy concatenates same-named arrays across cascade layers, which
# used to hand every post a mixed array of objects + keys.
- key: steven-newcomb
  name: Steven Newcomb
  bio: "Shawnee (Lenape), co-founder of the Indigenous Law Institute, author of “Pagans in the Promised Land: Decoding the Doctrine of Christian Discovery” and co-producer of the documentary “The Doctrine of Discovery: Unmasking the Domination Code”. Primary author of this site."
  location: Kumeyaay Territory, San Diego, CA
