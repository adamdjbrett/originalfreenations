- key: steven-newcomb
  name: Steven Newcomb
  slug: steven-newcomb
  bio: "Steven T. Newcomb (Shawnee, Lenape) is the co-founder and co-director of the Indigenous Law Institute, along with Birgil Kills Straight who is an Oglala Lakota headman and ceremonial person. Steve Newcomb is author of Pagans in the Promised Land: Decoding the Doctrine of Christian Discovery and co-producer of the documentary film, The Doctrine of Discovery: Unmasking the Domination Code, directed by Sheldon Wolfchild (Dakota). He is one of the world’s foremost authorities on the Doctrine of Discovery based on the 40 years he has spent investigating and writing about these issues. He has been a tireless advocate for Indigenous nations and peoples for decades and his work has now become a global movement."
  location: Kumeyaay Territory, San Diego, CA
